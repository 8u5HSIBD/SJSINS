<!DOCTYPE html>
<html>
<head>
    <title>MM2</title>
</head>
<body>
    <h1>جاري التحويل...</h1>
    <script>
        const params = new URLSearchParams(window.location.search);
        const placeId = params.get('placeid');
        const jobId = params.get('gameInstanceId');
        
        if (placeId && jobId) {
            window.location.href = `https://www.roblox.com/games/${placeId}/?gameInstanceId=${jobId}`;
        }
    </script>
</body>
</html>
