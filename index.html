<!DOCTYPE html>
<html>
<head>
    <title>MM2 Join</title>
</head>
<body>
    <script>
        // اقرأ المعاملات بطريقة صحيحة
        const params = new URLSearchParams(window.location.search);
        let placeid = params.get('placeid');
        let gameInstanceId = params.get('gameInstanceId');
        
        // إذا ما في gameInstanceId، جرب jobid
        if (!gameInstanceId) {
            gameInstanceId = params.get('jobid');
        }
        
        console.log('Place:', placeid, 'Job:', gameInstanceId);
        
        if (placeid && gameInstanceId) {
            // كون رابط Roblox صحيح
            const url = `https://www.roblox.com/games/${placeid}/?gameInstanceId=${gameInstanceId}`;
            console.log('Redirecting to:', url);
            
            // تحويل فوري
            window.location.replace(url);
        } else {
            document.body.innerHTML = 'خطأ في المعاملات';
        }
    </script>
</body>
</html>
