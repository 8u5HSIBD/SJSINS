<!DOCTYPE html>
<html>
<head>
    <title>MM2 Server Join</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 50px;
        }
        .container {
            background: #222;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            margin: 0 auto;
        }
        h1 { color: #ff0000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Murder Mystery 2</h1>
        <p>⏳ جاري الدخول للسيرفر...</p>
    </div>

    <script>
        // اقرأ المعاملات
        const urlParams = new URLSearchParams(window.location.search);
        const placeId = urlParams.get('placeid');
        const jobId = urlParams.get('gameInstanceId');

        console.log('PlaceId:', placeId);
        console.log('JobId:', jobId);

        if (placeId && jobId) {
            // كون الرابط بشكل صحيح
            const robloxUrl = `roblox://placeId=${placeId}&gameInstanceId=${jobId}`;
            
            console.log('URL:', robloxUrl);
            
            // حول للـ Roblox
            setTimeout(() => {
                window.location.href = robloxUrl;
            }, 500);
        } else {
            document.querySelector('p').textContent = '❌ خطأ: المعاملات ناقصة!';
        }
    </script>
</body>
</html>
